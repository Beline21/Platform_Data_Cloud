name: CI DAGs Airflow

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-dags:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout du code
      - name: Checkout repo
        uses: actions/checkout@v3

      # 2. Installer Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      # 3. Installer les dépendances Airflow (version 3.x)
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install apache-airflow==3.1.7
          pip install apache-airflow-providers-http  # si besoin pour l’API Open-Meteo
          pip install requests  # pour téléchargement DVF

      # 4. Lint Python
      - name: Lint Python
        run: |
          pip install flake8
          flake8 airflow/dags/  # vérifie le style des DAGs
